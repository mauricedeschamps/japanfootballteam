<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SAMURAI BLUE">

    <title>Japan National Team - SAMURAI BLUE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
        }

        /* ダークテーマ (サムライブルー) - デフォルト */
        :root {
            --bg-primary: #0a1428;
            --bg-secondary: #0f1a30;
            --bg-card: #16223b;
            --text-primary: #e8eef4;
            --text-secondary: #a0b3cc;
            --text-muted: #6a7c9e;
            --border: #243555;
            --accent: #1e3a6b;
            --accent-glow: #2b4a82;
            --samurai-blue: #1a2a4f;
            --samurai-gold: #c9a83b;
            --header-bg: #07122a;
            --btn-hover: #2b4a82;
        }

        /* ライトテーマ (クリアモード) */
        body.light {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e4eaf1;
            --bg-card: #ffffff;
            --text-primary: #1e2a3a;
            --text-secondary: #3a4a5a;
            --text-muted: #6c7a8a;
            --border: #cbd5e1;
            --accent: #d4e0f0;
            --accent-glow: #e2e8f0;
            --samurai-blue: #2563eb;
            --samurai-gold: #b8860b;
            --header-bg: #ffffff;
            --btn-hover: #1e3a8a;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-header {
            background-color: var(--header-bg);
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--samurai-gold);
            position: relative;
            z-index: 10;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .logo p {
            font-size: 0.75rem;
            color: var(--samurai-gold);
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            background-color: var(--accent);
            color: var(--text-primary);
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: var(--btn-hover);
            transform: scale(1.02);
        }

        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        .player-card {
            background-color: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid var(--border);
        }

        .player-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }

        .card-img {
            background: linear-gradient(135deg, var(--samurai-blue), var(--bg-secondary));
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: var(--samurai-gold);
            position: relative;
        }

        .card-img span {
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 2rem;
        }

        .player-info {
            padding: 1.2rem;
        }

        .player-name {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .player-name-en {
            font-size: 1rem;
            font-weight: normal;
            color: var(--text-secondary);
        }

        .player-pos {
            display: inline-block;
            background: var(--samurai-gold);
            color: #0a1428;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .player-club {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .detail-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .detail-card {
            background-color: var(--bg-card);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .detail-header {
            background: linear-gradient(135deg, var(--samurai-blue), var(--bg-secondary));
            padding: 2rem;
            text-align: center;
            border-bottom: 2px solid var(--samurai-gold);
        }

        .detail-number {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--samurai-gold);
        }

        .detail-name {
            font-size: 2rem;
            margin-top: 0.5rem;
        }

        .detail-name-en {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .detail-body {
            padding: 2rem;
        }

        .info-row {
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .info-label {
            font-weight: bold;
            color: var(--samurai-gold);
            min-width: 110px;
            display: inline-block;
        }

        .back-btn {
            display: block;
            width: 200px;
            margin: 2rem auto 1rem;
            padding: 0.8rem;
            text-align: center;
            background-color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-primary);
        }

        .app-footer {
            background-color: var(--header-bg);
            padding: 2rem 1.5rem;
            margin-top: 3rem;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-email {
            color: var(--samurai-gold);
            text-decoration: none;
            word-break: break-all;
        }

        .hidden {
            display: none;
        }

        .section-title {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            border-left: 4px solid var(--samurai-gold);
            padding-left: 1rem;
        }
    </style>
</head>

        }

        function setLanguage(lang) {
            currentLang = lang;
            updateUILanguage();
            if (!mainView.classList.contains('hidden')) {
                renderMainList();
            } else {
                if (window._currentDetailPlayer) renderDetail(window._currentDetailPlayer);
            }
        }

        function setTheme(theme) {
            currentTheme = theme;
            if (theme === 'light') {
                document.body.classList.add('light');
                themeBtn.innerHTML = UI_TEXTS[currentLang].themeDark;
            } else {
                document.body.classList.remove('light');
                themeBtn.innerHTML = UI_TEXTS[currentLang].themeLight;
            }
        }

        function toggleTheme() {
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        }

        function renderMainList() {
            const t = UI_TEXTS[currentLang];
            mainView.innerHTML = `
                <div class="main-container">
                    <h2 class="section-title">${t.sectionTitle}</h2>
                    <div class="players-grid" id="players-grid"></div>
                </div>
            `;
            const grid = document.getElementById('players-grid');
            PLAYERS.forEach(p => {
                const name = currentLang === 'ja' ? p.nameJa : p.nameEn;
                const nameSub = currentLang === 'ja' ? p.nameEn : p.nameJa;
                const pos = currentLang === 'ja' ? p.posJa : p.posEn;
                const club = currentLang === 'ja' ? p.clubJa : p.clubEn;
                const card = document.createElement('div');
                card.className = 'player-card';
                card.setAttribute('data-id', p.num);
                card.innerHTML = `
                    <div class="card-img"><span>${p.num}</span></div>
                    <div class="player-info">
                        <div class="player-name">${name} <span class="player-name-en">${nameSub}</span></div>
                        <div class="player-pos">${pos}</div>
                        <div class="player-club">${club}</div>
                    </div>
                `;
                card.addEventListener('click', () => showDetail(p));
                grid.appendChild(card);
            });
        }

        function showDetail(player) {
            window._currentDetailPlayer = player;
            renderDetail(player);
            mainView.classList.add('hidden');
            detailView.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function renderDetail(p) {
            const t = UI_TEXTS[currentLang];
            const labels = t.detailLabels;
            const name = currentLang === 'ja' ? p.nameJa : p.nameEn;
            const nameSub = currentLang === 'ja' ? p.nameEn : p.nameJa;
            const pos = currentLang === 'ja' ? p.posJa : p.posEn;
            const club = currentLang === 'ja' ? p.clubJa : p.clubEn;
            const prefecture = currentLang === 'ja' ? p.prefectureJa : p.prefectureEn;
            const prevClub = currentLang === 'ja' ? p.prevClubJa : p.prevClubEn;
            const youth = currentLang === 'ja' ? p.youthJa : p.youthEn;
            const jleague = currentLang === 'ja' ? p.jleagueJa : p.jleagueEn;

            detailView.innerHTML = `
                <div class="detail-container">
                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-number">${p.num}</div>
                            <div class="detail-name">${name}</div>
                            <div class="detail-name-en">${nameSub}</div>
                            <div class="player-pos" style="margin-top:1rem;">${pos}</div>
                        </div>
                        <div class="detail-body">
                            <div class="info-row"><span class="info-label">${labels.position}:</span> ${pos}</div>
                            <div class="info-row"><span class="info-label">${labels.club}:</span> ${club}</div>
                            <div class="info-row"><span class="info-label">${labels.prefecture}:</span> ${prefecture}</div>
                            <div class="info-row"><span class="info-label">${labels.prevClub}:</span> ${prevClub}</div>
                            <div class="info-row"><span class="info-label">${labels.youth}:</span> ${youth}</div>
                            <div class="info-row"><span class="info-label">${labels.jleague}:</span> ${jleague || '—'}</div>
                        </div>
                    </div>
                    <button id="detail-back-btn" class="back-btn">${t.back}</button>
                </div>
            `;
            document.getElementById('detail-back-btn').addEventListener('click', () => {
                mainView.classList.remove('hidden');
                detailView.classList.add('hidden');
                renderMainList();
            });
        }

        function init() {
            setTheme('dark');
            updateUILanguage();
            renderMainList();
            langBtn.addEventListener('click', () => setLanguage(currentLang === 'en' ? 'ja' : 'en'));
            themeBtn.addEventListener('click', toggleTheme);
        }

        init();

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => {
                    console.log('SW failed:', err);
                });
            });
        }
    </script>
</body>
</html>
